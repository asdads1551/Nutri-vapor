services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: nutri
      POSTGRES_PASSWORD: nutri_dev
      POSTGRES_DB: nutri_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutri -d nutri_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
