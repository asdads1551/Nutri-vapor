services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: nutri
      POSTGRES_PASSWORD: nutri_dev
      POSTGRES_DB: nutri_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutri -d nutri_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://nutri:nutri_dev@db:5432/nutri_db"
      JWT_SECRET: "${JWT_SECRET:-dev-secret-change-in-production}"
      FIREBASE_PROJECT_ID: "${FIREBASE_PROJECT_ID:-nutri-app-c0d75}"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    build: .
    environment:
      DATABASE_URL: "postgres://nutri:nutri_dev@db:5432/nutri_db"
    depends_on:
      db:
        condition: service_healthy
    command: ["migrate", "--yes"]
    deploy:
      replicas: 0

  revert:
    build: .
    environment:
      DATABASE_URL: "postgres://nutri:nutri_dev@db:5432/nutri_db"
    depends_on:
      db:
        condition: service_healthy
    command: ["migrate", "--revert", "--yes"]
    deploy:
      replicas: 0

volumes:
  pgdata:
